{% extends "main/base.html" %}

{% block content %}
<div class="form">
    <form method="post" id="form">
        <h1> New Password </h1>
        {% csrf_token %}
        <div class="input-box">
            {{form.new_password1}}
        </div>
        <div class="input-box">
            {{form.new_password2}}
        </div>
        <div id="btn">
            <button type="submit" class="btn btn-secondary">Change</button>
        </div>
    </form>
</div>
{% endblock %}
